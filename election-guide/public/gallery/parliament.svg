<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#2e7d32"/>
  <rect x="0" y="395" width="800" height="10" fill="#388e3c"/>
  <!-- New Parliament Building - circular design -->
  <!-- Main structure -->
  <rect x="150" y="200" width="500" height="200" rx="0" fill="#f5f5f5"/>
  <!-- Triangular roof -->
  <polygon points="400,80 100,200 700,200" fill="#e0e0e0"/>
  <polygon points="400,80 100,200 700,200" fill="none" stroke="#bdbdbd" stroke-width="2"/>
  <!-- Columns -->
  <rect x="160" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="210" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="260" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="310" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="360" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="410" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="460" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="510" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="560" y="200" width="20" height="200" fill="#eeeeee"/>
  <rect x="610" y="200" width="20" height="200" fill="#eeeeee"/>
  <!-- Central dome -->
  <ellipse cx="400" cy="160" rx="80" ry="50" fill="#e0e0e0"/>
  <ellipse cx="400" cy="155" rx="70" ry="40" fill="#eeeeee"/>
  <!-- Ashoka Chakra on dome -->
  <circle cx="400" cy="150" r="25" fill="none" stroke="#1a237e" stroke-width="3"/>
  <circle cx="400" cy="150" r="5" fill="#1a237e"/>
  <!-- Flag on top -->
  <line x1="400" y1="80" x2="400" y2="30" stroke="#9e9e9e" stroke-width="3"/>
  <rect x="400" y="30" width="50" height="10" fill="#FF9933"/>
  <rect x="400" y="40" width="50" height="10" fill="white"/>
  <rect x="400" y="50" width="50" height="10" fill="#138808"/>
  <!-- Steps -->
  <rect x="200" y="395" width="400" height="10" fill="#e0e0e0"/>
  <rect x="220" y="385" width="360" height="10" fill="#eeeeee"/>
  <!-- India flag strip -->
  <rect x="0" y="0" width="800" height="6" fill="#FF9933"/>
  <rect x="0" y="6" width="800" height="6" fill="white" opacity="0.8"/>
  <rect x="0" y="12" width="800" height="6" fill="#138808"/>
  <!-- Text -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white" opacity="0.95">New Parliament of India — Sansad Bhavan, New Delhi</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" fill="white" opacity="0.7">भारत का नया संसद भवन</text>
</svg>