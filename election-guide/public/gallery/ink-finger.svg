<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="inkbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF9933;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#inkbg)"/>
  <!-- Glow effect -->
  <ellipse cx="400" cy="250" rx="200" ry="200" fill="url(#glow)"/>
  <!-- Hand/finger illustration -->
  <!-- Palm -->
  <ellipse cx="400" cy="380" rx="100" ry="70" fill="#ffcc80"/>
  <!-- Fingers -->
  <rect x="310" y="240" width="45" height="140" rx="22" fill="#ffcc80"/>
  <rect x="365" y="200" width="45" height="180" rx="22" fill="#ffcc80"/>
  <rect x="420" y="210" width="45" height="170" rx="22" fill="#ffcc80"/>
  <rect x="475" y="240" width="40" height="140" rx="20" fill="#ffcc80"/>
  <!-- Thumb -->
  <ellipse cx="290" cy="340" rx="30" ry="50" fill="#ffcc80" transform="rotate(-20, 290, 340)"/>
  <!-- Ink mark on index finger -->
  <ellipse cx="387" cy="215" rx="20" ry="15" fill="#1a237e" opacity="0.9"/>
  <ellipse cx="387" cy="215" rx="14" ry="10" fill="#283593"/>
  <text x="387" y="219" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">✓</text>
  <!-- Ink drip effect -->
  <ellipse cx="387" cy="232" rx="6" ry="8" fill="#1a237e" opacity="0.7"/>
  <!-- Voted badge -->
  <rect x="520" y="180" width="180" height="80" rx="12" fill="white" opacity="0.95"/>
  <text x="610" y="210" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a237e">मैंने मतदान</text>
  <text x="610" y="232" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a237e">किया ✓</text>
  <text x="610" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF9933">I VOTED</text>
  <!-- India flag strip -->
  <rect x="0" y="0" width="800" height="6" fill="#FF9933"/>
  <rect x="0" y="6" width="800" height="6" fill="white" opacity="0.8"/>
  <rect x="0" y="12" width="800" height="6" fill="#138808"/>
  <!-- Text -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="white" opacity="0.95">Indelible Ink — Symbol of Indian Democracy</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" fill="white" opacity="0.7">अमिट स्याही — भारतीय लोकतंत्र का प्रतीक</text>
</svg>