  <rect x="0" y="0" width="800" height="6" fill="#FF9933"/>
  <rect x="0" y="6" width="800" height="6" fill="white" opacity="0.8"/>
  <rect x="0" y="12" width="800" height="6" fill="#138808"/>
  <!-- Text -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="white" opacity="0.95">Voters in Queue — India General Election 2024</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" fill="white" opacity="0.7">मतदाता कतार में — भारत आम चुनाव 2024</text>
