    <line x1="565" y1="293" x2="587" y2="318" stroke="#ffe082" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Queue rope/barrier -->
  <line x1="60" y1="410" x2="600" y2="410" stroke="#FF9933" stroke-width="3" stroke-dasharray="10,5"/>
  <!-- Voter ID cards -->
  <rect x="100" y="340" width="30" height="20" rx="2" fill="white" opacity="0.8"/>
  <text x="115" y="354" text-anchor="middle" font-family="Arial" font-size="6" fill="#1a237e">EPIC</text>
