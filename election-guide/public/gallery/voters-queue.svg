  <text x="690" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#90caf9">मतदान केंद्र</text>
  <!-- Door -->
  <rect x="655" y="310" width="70" height="90" rx="4" fill="#1a237e"/>
  <circle cx="718" cy="355" r="5" fill="#FF9933"/>
  <!-- Queue of diverse Indian voters -->
  
    <circle cx="80" cy="260" r="18" fill="#ffb74d"/>
