<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Floor -->
  <rect x="0" y="380" width="800" height="120" fill="url(#floor)" opacity="0.3"/>
  <!-- Polling booth structure -->
  <rect x="150" y="120" width="200" height="260" rx="8" fill="white" opacity="0.95"/>
  <rect x="150" y="120" width="200" height="40" rx="8" fill="#FF9933"/>
  <text x="250" y="147" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">POLLING BOOTH</text>
  <!-- EVM inside booth -->
  <rect x="185" y="200" width="130" height="80" rx="6" fill="#1a237e"/>
  <rect x="185" y="200" width="130" height="25" rx="6" fill="#283593"/>
  <text x="250" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="white">EVM</text>
  <!-- Buttons on EVM -->
  <circle cx="210" cy="250" r="8" fill="#FF9933"/>
  <circle cx="235" cy="250" r="8" fill="#4caf50"/>
  <circle cx="260" cy="250" r="8" fill="#f44336"/>
  <circle cx="285" cy="250" r="8" fill="#2196f3"/>
  <!-- Person 1 voting -->
  <circle cx="250" cy="330" r="20" fill="#ffb74d"/>
  <rect x="230" y="350" width="40" height="50" rx="5" fill="#3f51b5"/>
  <line x1="250" y1="370" x2="220" y2="390" stroke="#ffb74d" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="370" x2="280" y2="380" stroke="#ffb74d" stroke-width="4" stroke-linecap="round"/>
  <!-- Queue of people -->
  <circle cx="430" cy="340" r="18" fill="#ff8a65"/>
  <rect x="412" y="358" width="36" height="45" rx="5" fill="#e91e63"/>
  <circle cx="490" cy="345" r="16" fill="#a5d6a7"/>
  <rect x="474" y="361" width="32" height="40" rx="5" fill="#388e3c"/>
  <circle cx="545" cy="342" r="17" fill="#ffcc80"/>
  <rect x="528" y="359" width="34" height="42" rx="5" fill="#ff5722"/>
  <circle cx="600" cy="344" r="16" fill="#b39ddb"/>
  <rect x="584" y="360" width="32" height="41" rx="5" fill="#673ab7"/>
  <!-- Queue line -->
  <line x1="390" y1="400" x2="650" y2="400" stroke="white" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <!-- India flag colors strip at top -->
  <rect x="0" y="0" width="800" height="8" fill="#FF9933"/>
  <rect x="0" y="8" width="800" height="8" fill="white" opacity="0.8"/>
  <rect x="0" y="16" width="800" height="8" fill="#138808"/>
  <!-- Text -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white" opacity="0.9">Voters at Polling Booth — Lok Sabha 2024</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" fill="white" opacity="0.6">मतदान केंद्र पर मतदाता</text>
</svg>