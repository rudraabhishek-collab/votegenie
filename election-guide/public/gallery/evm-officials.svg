<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="offbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="100%" style="stop-color:#bf360c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#offbg)"/>
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#4e342e" opacity="0.5"/>
  <!-- Official 1 carrying EVM box -->
  <circle cx="220" cy="220" r="35" fill="#ffb74d"/>
  <rect x="185" y="255" width="70" height="90" rx="5" fill="#1a237e"/>
  <!-- Khaki uniform details -->
  <rect x="185" y="255" width="70" height="20" fill="#283593"/>
  <text x="220" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="white">ECI OFFICIAL</text>
  <!-- Arms carrying box -->
  <rect x="155" y="280" width="30" height="12" rx="6" fill="#ffb74d"/>
  <rect x="255" y="280" width="30" height="12" rx="6" fill="#ffb74d"/>
  <!-- EVM box being carried -->
  <rect x="155" y="260" width="130" height="80" rx="6" fill="#37474f"/>
  <rect x="155" y="260" width="130" height="25" rx="6" fill="#455a64"/>
  <text x="220" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#90caf9">EVM BOX</text>
  <text x="220" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#b0bec5">SEALED</text>
  <rect x="195" y="305" width="50" height="20" rx="3" fill="#FF9933"/>
  <text x="220" y="319" text-anchor="middle" font-family="Arial" font-size="8" fill="white">ECI SEAL</text>
  <!-- Official 2 -->
  <circle cx="450" cy="215" r="32" fill="#ff8a65"/>
  <rect x="418" y="247" width="64" height="85" rx="5" fill="#1a237e"/>
  <rect x="418" y="247" width="64" height="18" fill="#283593"/>
  <text x="450" y="260" text-anchor="middle" font-family="Arial" font-size="7" fill="white">ECI OFFICIAL</text>
  <!-- Clipboard -->
  <rect x="470" y="270" width="40" height="50" rx="3" fill="#fff9c4"/>
  <line x1="475" y1="280" x2="505" y2="280" stroke="#9e9e9e" stroke-width="1.5"/>
  <line x1="475" y1="290" x2="505" y2="290" stroke="#9e9e9e" stroke-width="1.5"/>
  <line x1="475" y1="300" x2="505" y2="300" stroke="#9e9e9e" stroke-width="1.5"/>
  <!-- Official 3 -->
  <circle cx="620" cy="220" r="30" fill="#a5d6a7"/>
  <rect x="590" y="250" width="60" height="80" rx="5" fill="#1a237e"/>
  <!-- VVPAT box -->
  <rect x="560" y="255" width="80" height="60" rx="5" fill="#263238"/>
  <text x="600" y="275" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#90caf9">VVPAT</text>
  <text x="600" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#b0bec5">UNIT</text>
  <!-- ECI Logo area -->
  <rect x="320" y="100" width="160" height="80" rx="10" fill="white" opacity="0.15"/>
  <text x="400" y="135" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">ELECTION</text>
  <text x="400" y="155" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">COMMISSION</text>
  <text x="400" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF9933">OF INDIA</text>
  <!-- India flag strip -->
  <rect x="0" y="0" width="800" height="6" fill="#FF9933"/>
  <rect x="0" y="6" width="800" height="6" fill="white" opacity="0.8"/>
  <rect x="0" y="12" width="800" height="6" fill="#138808"/>
  <!-- Text -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="white" opacity="0.95">ECI Officials Carrying EVMs — General Elections 2024</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" fill="white" opacity="0.7">चुनाव अधिकारी EVM ले जाते हुए — आम चुनाव 2024</text>
</svg>